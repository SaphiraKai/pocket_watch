name = "pocket_watch"
version = "2.0.0"

description = "Easily time execution of a block or function!"
licences = ["Apache-2.0"]
repository = { type = "github", user = "SaphiraKai", repo = "https://github.com/SaphiraKai/pocket_watch" }
links = []

internal_modules = [
  "pocket_watch/ffi",
  "pocket_watch/ffi/*",
  "pocket_watch/dev",
  "pocket_watch/dev/*",
]
[dependencies]
gleam_stdlib = ">= 0.34.0 and < 2.0.0"
humanise = ">= 1.0.2 and < 2.0.0"
gleam_time = ">= 1.7.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
simplifile = ">= 2.4.0 and < 3.0.0"
booklet = ">= 1.1.0 and < 2.0.0"
